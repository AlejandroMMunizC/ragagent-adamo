<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RAGAGENT - Agentic RAG assistant</title>
    <style>
        :root {
            --color-primary: #6366f1;
            --color-primary-hover: #4f46e5;
            --color-bg: #1f2937;
            --color-panel: #111827;
            --color-border: #374151;
            --color-text: #f9fafb;
            --color-text-muted: #9ca3af;
            --radius: 12px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--color-text);
        }

        .container {
            background-color: var(--color-panel);
            padding: 32px;
            max-width: 600px;
            width: 100%;
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        h1 {
            text-align: center;
            color: var(--color-text);
            margin-bottom: 24px;
            font-size: 24px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--color-text-muted);
            font-weight: 600;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            background-color: #0f172a;
            color: var(--color-text);
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            background-color: var(--color-primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover { background-color: var(--color-primary-hover); }

        #answer {
            margin-top: 30px;
            background-color: #0f172a;
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            color: var(--color-text);
        }

        .spinner {
            border: 4px solid #334155;
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden { display: none; }

        .close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: #f87171;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            transition: color 0.2s ease;
        }

        .close:hover { color: #ef4444; }
    </style>
    <script>
        function ask() {
            const question = document.getElementById('question').value.trim();
            const k = parseInt(document.getElementById('k').value);
            const spinner = document.getElementById('spinner');
            const answerDiv = document.getElementById('answer');
            const askBtn = document.getElementById('ask');

            if (!question) {
                answerDiv.innerText = "Please type a question first.";
                return;
            }

            answerDiv.innerText = "";
            spinner.classList.remove('hidden');
            askBtn.disabled = true;
            askBtn.innerText = "Processing...";

            window.pywebview.api.preguntar_al_agente(question, k).then(response => {
                spinner.classList.add('hidden');
                answerDiv.innerText = response;
                document.getElementById('save').classList.remove('hidden');
                askBtn.disabled = false;
                askBtn.innerText = "Ask";
            }).catch(() => {
                spinner.classList.add('hidden');
                answerDiv.innerText = "Error processing the request.";
                askBtn.disabled = false;
                askBtn.innerText = "Ask";
            });
        }

        function closeApp() {
            if (window.pywebview) {
                window.pywebview.api.cerrar_aplicacion();
            } else {
                window.close();
            }
        }

        function clearFields() {
            document.getElementById('question').value = '';
            document.getElementById('answer').innerText = '';
        }

        function saveAnswer() {
            const answer = document.getElementById('answer').innerText;
            const question = document.getElementById('question').value.trim();
            if (answer && question) {
                const timestamp = new Date().toISOString();
                window.pywebview.api.guardar_respuesta_completa({
                    timestamp: timestamp,
                    pregunta: question,
                    contenido: answer
                }).then(() => {
                    alert("Answer saved to LOGS/.");
                }).catch(() => {
                    alert("Failed to save the answer.");
                });
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <button class="close" onclick="closeApp()">x</button>
        <h1>RAGAGENT - your agentic assistant</h1>

        <div class="form-group">
            <label for="question">Question</label>
            <input type="text" id="question" placeholder="Type your question here...">
        </div>

        <div class="form-group">
            <label for="k">Fragments to retrieve (k)</label>
            <input type="number" id="k" value="5" min="1" max="20">
        </div>

        <div class="buttons">
            <button id="ask" onclick="ask()">Ask</button>
            <button onclick="clearFields()">Clear</button>
        </div>

        <div id="spinner" class="spinner hidden"></div>
        <div id="answer"></div>
        <button id="save" class="hidden" onclick="saveAnswer()">Save answer</button>
    </div>
</body>
</html>
